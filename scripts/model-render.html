<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Renderer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 800px;
      height: 600px;
      overflow: hidden;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    model-viewer {
      width: 800px;
      height: 600px;
      background-color: #2a2a2a;
      --poster-color: #2a2a2a;
    }
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="status">Waiting for model...</div>

  <model-viewer
    id="viewer"
    camera-controls
    interaction-prompt="none"
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="0deg"
    bounds="tight"
    camera-target="auto auto auto"
    camera-orbit="0deg 75deg auto"
    shadow-intensity="0.5"
    shadow-softness="1"
    tone-mapping="neutral"
    environment-image="neutral"
    exposure="0.8"
    reveal="auto"
    style="width:800px;height:600px;background:#2a2a2a;"
  ></model-viewer>

  <script>
    const viewer = document.getElementById('viewer');
    const status = document.getElementById('status');

    // Get model URL from query params
    const params = new URLSearchParams(window.location.search);
    const modelUrl = params.get('model');

    if (modelUrl) {
      status.textContent = `Loading: ${modelUrl}`;
      viewer.src = modelUrl;

      viewer.addEventListener('load', async () => {
        status.textContent = 'Model loaded, adjusting materials...';

        // Apply the same material adjustments as SimpleARModelViewer
        try {
          if (viewer.model && viewer.model.materials) {
            const material = viewer.model.materials[0];
            if (material && material.pbrMetallicRoughness) {
              material.pbrMetallicRoughness.setRoughnessFactor(0.4);
              material.pbrMetallicRoughness.setMetallicFactor(0.9);
            }
          }

          viewer.cameraTarget = 'auto auto auto';
          if (typeof viewer.updateFraming === 'function') {
            viewer.updateFraming();
          }
          viewer.cameraOrbit = '0deg 75deg auto';
        } catch (e) {
          console.warn('Material adjustment error:', e);
        }

        // Wait for rendering to stabilize
        await new Promise(r => setTimeout(r, 2000));

        status.textContent = 'READY';
        // Signal to puppeteer that screenshot can be taken
        window.__MODEL_READY__ = true;
      });

      viewer.addEventListener('error', (e) => {
        status.textContent = `ERROR: ${e.detail?.message || 'Unknown'}`;
        window.__MODEL_ERROR__ = true;
      });
    } else {
      status.textContent = 'No model URL provided';
    }
  </script>
</body>
</html>
